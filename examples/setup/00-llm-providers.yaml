# LLM providers — cluster-scoped, define once, reference by name from Agent CRs.
#
# CRD chain: LLMProvider → Agent ← Proposal
#
# The type field is the discriminator. Exactly one per-provider config
# block must be set, matching the type value.
---
apiVersion: agentic.openshift.io/v1alpha1
kind: LLMProvider
metadata:
  name: smart
spec:
  type: GoogleCloudVertex
  model: claude-opus-4-6
  googleCloudVertex:
    credentialsSecret:
      name: llm-credentials
      namespace: openshift-lightspeed
    project: my-gcp-project
    region: us-central1
---
apiVersion: agentic.openshift.io/v1alpha1
kind: LLMProvider
metadata:
  name: fast
spec:
  type: GoogleCloudVertex
  model: claude-haiku-4-5
  googleCloudVertex:
    credentialsSecret:
      name: llm-credentials
      namespace: openshift-lightspeed
    project: my-gcp-project
    region: us-central1

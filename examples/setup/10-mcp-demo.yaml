# Demo: MCP server integration with the agent sandbox flow.
# Deploys ComponentTools that connect to the in-cluster openshift-mcp-server
# and creates a proposal to diagnose cluster state using MCP tools.
#
# Prerequisites:
#   helm install kubernetes-mcp-server ./charts/kubernetes-mcp-server \
#     --namespace openshift-lightspeed --set openshift=true \
#     --set rbac.create=true --set ingress.enabled=false \
#     --set 'rbac.extraClusterRoleBindings[0].name=cluster-view' \
#     --set 'rbac.extraClusterRoleBindings[0].roleRef.name=view' \
#     --set 'rbac.extraClusterRoleBindings[0].roleRef.external=true'
---
apiVersion: agentic.openshift.io/v1alpha1
kind: ComponentTools
metadata:
  name: mcp-demo-tools
  namespace: openshift-lightspeed
spec:
  skills:
    - image: image-registry.openshift-image-registry.svc:5000/openshift-lightspeed/lightspeed-skills:latest
  mcpServers:
    - name: openshift
      url: http://kubernetes-mcp-server.openshift-lightspeed.svc:8080/mcp
      timeoutSeconds: 30
  systemPrompt: |
    You are an OpenShift cluster analyst. You MUST use the MCP tools
    (mcp__openshift__*) to query the Kubernetes API. Do NOT use oc, kubectl,
    or Bash commands for cluster queries — use ONLY the MCP server tools.

    The MCP server "openshift" provides tools like list_resources, get_resource,
    list_api_resources, etc. Use these to inspect namespaces, pods, nodes, and
    other cluster objects.

    Summarize your findings clearly with resource names, namespaces, and any
    issues found.
---
apiVersion: agentic.openshift.io/v1alpha1
kind: Workflow
metadata:
  name: mcp-demo
  namespace: openshift-lightspeed
spec:
  analysis:
    agent: smart
    componentTools:
      name: mcp-demo-tools
---
apiVersion: agentic.openshift.io/v1alpha1
kind: Proposal
metadata:
  name: mcp-demo-cluster-health
  namespace: openshift-lightspeed
spec:
  workflow:
    name: mcp-demo
  request: |
    Using ONLY the MCP tools (mcp__openshift__*), NOT oc or kubectl:
    1. List all nodes and report their status
    2. List pods in the openshift-lightspeed namespace
    3. Summarize what you found
  targetNamespaces:
    - openshift-lightspeed

# Agents — cluster-scoped tiers that pair an LLM provider with runtime settings.
# Referenced by name from Proposal steps.
#
# Agents define infrastructure tiers (smart vs fast). Domain-specific tooling
# (skills images, required secrets) is specified on Proposals via spec.tools.
---
apiVersion: agentic.openshift.io/v1alpha1
kind: Agent
metadata:
  name: smart
spec:
  llmProvider:
    name: smart
  timeouts:
    analysisSeconds: 300
    executionSeconds: 600
    verificationSeconds: 300
  maxTurns: 200
  providerSettings:
    reasoningEffort: "high"
---
apiVersion: agentic.openshift.io/v1alpha1
kind: Agent
metadata:
  name: fast
spec:
  llmProvider:
    name: fast
  timeouts:
    analysisSeconds: 120
    executionSeconds: 300
    verificationSeconds: 120
  maxTurns: 100
  providerSettings:
    reasoningEffort: "low"
---
# The "default" agent must exist — the operator uses it when a
# Proposal step omits the agent field.
apiVersion: agentic.openshift.io/v1alpha1
kind: Agent
metadata:
  name: default
spec:
  llmProvider:
    name: smart
  maxTurns: 200

# GitOps workflow setup.
#
# When RHACS detects a policy violation in an ArgoCD-managed namespace,
# the GitOps adapter creates a LightspeedProposal using this workflow.
# The analysis agent inspects the cluster and advises git repository changes.
# The execution agent creates a pull request with the fix.
# ArgoCD syncs the merged PR to the cluster.
#
# Requires: LLMProvider "smart" and "fast" from 00-llm-providers.yaml
#           Agent "smart" and "fast" from 01-agents.yaml

---
# GitOps-specific ComponentTools
apiVersion: agentic.openshift.io/v1alpha1
kind: ComponentTools
metadata:
  name: gitops-analysis
  namespace: openshift-lightspeed
spec:
  skills:
    - image: image-registry.openshift-image-registry.svc:5000/openshift-lightspeed/lightspeed-skills:latest
  systemPrompt: |
    You are an expert security remediation advisor for OpenShift clusters
    managed by GitOps (ArgoCD).

    IMPORTANT: The affected namespace is managed by ArgoCD.
    Do NOT propose direct cluster changes — they will be reverted by ArgoCD.
    Instead, describe the exact changes needed in the git repository.

    ## Your Task
    1. Investigate the ACS policy violation
    2. Read the current state of the git repository using `gh`
    3. Describe the exact YAML changes needed (file paths, diffs)
    4. Assess risk and downtime impact

    ## Rules
    - Use `gh` ONLY to READ the git repo — do NOT create PRs
    - Describe changes as git diffs or YAML snippets, NOT kubectl commands
    - Do NOT include RBAC permissions — execution creates a PR
  requiredSecrets:
    - name: github-token
      description: "GitHub API token for repository access"
      mountAs: GH_TOKEN
    - name: acs-api-token
      description: "ACS Central API token"
      mountAs: ACS_API_TOKEN
---
apiVersion: agentic.openshift.io/v1alpha1
kind: ComponentTools
metadata:
  name: gitops-execution
  namespace: openshift-lightspeed
spec:
  skills:
    - image: image-registry.openshift-image-registry.svc:5000/openshift-lightspeed/lightspeed-skills-remediate:latest
  systemPrompt: |
    You are a GitOps execution agent for OpenShift clusters. You create
    pull requests in git repositories to remediate security violations,
    then merge them so ArgoCD can sync the fix to the cluster.

    ## Your Task
    1. Clone the git repository, create a branch
    2. Apply the exact changes described in the proposal
    3. Open and merge a pull request

    ## Rules
    - Create a PR with the EXACT changes described in the proposal
    - MERGE the PR using `gh pr merge --squash --delete-branch`
  requiredSecrets:
    - name: github-token
      description: "GitHub API token for PR creation"
      mountAs: GH_TOKEN
---
apiVersion: agentic.openshift.io/v1alpha1
kind: ComponentTools
metadata:
  name: gitops-verification
  namespace: openshift-lightspeed
spec:
  skills:
    - image: image-registry.openshift-image-registry.svc:5000/openshift-lightspeed/lightspeed-skills:latest
  systemPrompt: |
    You are an independent verification agent for GitOps-managed OpenShift
    clusters. Verify the remediation PR was merged and ArgoCD synced the fix.

    ## Your Task
    1. Check PR was merged via `gh pr view`
    2. Force ArgoCD sync refresh
    3. Verify new pods are running with the updated image
  requiredSecrets:
    - name: github-token
      description: "GitHub API token for PR status checks"
      mountAs: GH_TOKEN

---
# GitOps workflows
apiVersion: agentic.openshift.io/v1alpha1
kind: Workflow
metadata:
  name: gitops-remediation
  namespace: openshift-lightspeed
spec:
  analysis:
    agent: smart
    componentTools:
      name: gitops-analysis
  execution:
    agent: fast
    componentTools:
      name: gitops-execution
  verification:
    agent: fast
    componentTools:
      name: gitops-verification
---
# Advisory only: analyze and advise git changes, no PR
apiVersion: agentic.openshift.io/v1alpha1
kind: Workflow
metadata:
  name: gitops-advisory
  namespace: openshift-lightspeed
spec:
  analysis:
    agent: smart
    componentTools:
      name: gitops-analysis

---
# Example proposal
apiVersion: agentic.openshift.io/v1alpha1
kind: Proposal
metadata:
  name: gitops-cve-ubi8-example
  namespace: openshift-lightspeed
  labels:
    agentic.openshift.io/source: gitops
    agentic.openshift.io/policy: fixable-cve-critical
spec:
  workflow:
    name: gitops-remediation
  request: |
    ACS policy violation: Fixable CVSS >= 7 (severity: CRITICAL_SEVERITY)
    Policy description: Alert on deployments with fixable vulnerabilities with a CVSS of at least 7
    Affected deployment: gitops-demo/vulnerable-app
    Affected images: registry.access.redhat.com/ubi8/ubi-minimal:8.6
    Violations:
      - CVE-2023-4911 (CVSS 7.8) in ubi8/ubi-minimal:8.6 — glibc buffer overflow (Looney Tunables)
      - CVE-2023-38545 (CVSS 9.8) in ubi8/ubi-minimal:8.6 — curl SOCKS5 heap overflow

    --- GitOps Context ---
    This namespace is managed by ArgoCD (GitOps). Do NOT make direct cluster changes.
    Instead, describe the exact changes needed in the git repository and create a PR.
    Git repository: https://github.com/NotAKubeKlaw/lightspeed-gitops-demo
    App path in repo: apps/gitops-demo
    ArgoCD application: openshift-gitops
  targetNamespaces:
    - gitops-demo

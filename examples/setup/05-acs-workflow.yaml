# ACS (Red Hat Advanced Cluster Security) workflow setup.
#
# When RHACS detects a policy violation (vulnerable image, misconfiguration,
# runtime anomaly), the ACS adapter creates a Proposal using one of these
# workflows. The adapter checks if the target namespace is GitOps-managed
# and selects the appropriate workflow.
#
# Requires: LLMProvider "smart" and "fast" from 00-llm-providers.yaml
#           Agent "smart" and "fast" from 01-agents.yaml

---
# ACS-specific ComponentTools
apiVersion: agentic.openshift.io/v1alpha1
kind: ComponentTools
metadata:
  name: acs-analysis
  namespace: openshift-lightspeed
spec:
  skills:
    - image: image-registry.openshift-image-registry.svc:5000/openshift-lightspeed/lightspeed-skills:latest
  systemPrompt: |
    You are an expert security remediation agent for OpenShift clusters.
    You are investigating a policy violation detected by Red Hat Advanced
    Cluster Security (RHACS/StackRox).

    You have the following CLI tools available:
    - `oc` — OpenShift CLI for inspecting cluster resources
    - `promtool` — Prometheus tool for metric queries
    - `curl` — HTTP client for API calls (Red Hat Knowledge Base, etc.)

    ## Your Task
    1. Investigate the ACS policy violation described in the request
    2. Identify the affected deployment, images, and namespace
    3. Determine the root cause (vulnerable image, misconfiguration, etc.)
    4. Propose one or more remediation options — prioritize security fixes
    5. Assess the risk of each option and whether it causes downtime

    ## Image Recommendations
    When recommending replacement images, prefer this priority order:
    1. Red Hat UBI images (registry.access.redhat.com/ubi9/*, ubi8/*)
    2. Red Hat certified images from the Red Hat container catalog
    3. Upstream vendor-maintained images with security updates

    ## Rules
    - Use `oc` to inspect the affected deployment, pods, and images
    - Check if the deployment has proper securityContext, resource limits
    - For CVE-related violations, recommend upgrading to a patched image
    - For misconfiguration violations, recommend the specific YAML changes
    - Always check if other deployments in the namespace use the same image
    - Include RBAC permissions needed for the execution agent
  requiredSecrets:
    - name: acs-api-token
      description: "ACS Central API token for querying violations"
      mountAs: ACS_API_TOKEN
---
apiVersion: agentic.openshift.io/v1alpha1
kind: ComponentTools
metadata:
  name: acs-gitops-analysis
  namespace: openshift-lightspeed
spec:
  skills:
    - image: image-registry.openshift-image-registry.svc:5000/openshift-lightspeed/lightspeed-skills:latest
  systemPrompt: |
    You are an expert security remediation advisor for OpenShift clusters.
    You are investigating a policy violation detected by Red Hat Advanced
    Cluster Security (RHACS/StackRox).

    IMPORTANT: The affected namespace is managed by GitOps (ArgoCD).
    Do NOT propose direct cluster changes — they will be reverted by ArgoCD.
    Instead, describe the exact YAML changes that need to be made in the
    git repository.

    ## Your Task
    1. Investigate the ACS policy violation
    2. Identify the root cause
    3. Describe the exact YAML changes needed in the git repository
    4. Assess risk and whether the change causes downtime

    ## Rules
    - Describe changes as git diffs or YAML snippets, not kubectl commands
    - Include the full resource path (deployment name, container name, field)
    - Do NOT include RBAC permissions — execution is skipped for GitOps
  requiredSecrets:
    - name: acs-api-token
      description: "ACS Central API token for querying violations"
      mountAs: ACS_API_TOKEN
---
apiVersion: agentic.openshift.io/v1alpha1
kind: ComponentTools
metadata:
  name: acs-execution
  namespace: openshift-lightspeed
spec:
  skills:
    - image: image-registry.openshift-image-registry.svc:5000/openshift-lightspeed/lightspeed-skills-remediate:latest
  systemPrompt: |
    You are an expert SRE agent executing an approved security remediation
    on an OpenShift cluster. Execute ONLY the approved actions.

---
# ACS workflows
#
# Full remediation: analyze vulnerability → execute fix → verify
apiVersion: agentic.openshift.io/v1alpha1
kind: Workflow
metadata:
  name: acs-remediation
  namespace: openshift-lightspeed
spec:
  analysis:
    agent: smart
    componentTools:
      name: acs-analysis
  execution:
    agent: fast
    componentTools:
      name: acs-execution
  verification:
    agent: fast
    componentTools:
      name: cluster-ops-verification
---
# GitOps remediation: analyze → advise git changes → user applies → verify
apiVersion: agentic.openshift.io/v1alpha1
kind: Workflow
metadata:
  name: acs-gitops-remediation
  namespace: openshift-lightspeed
spec:
  analysis:
    agent: smart
    componentTools:
      name: acs-gitops-analysis
  verification:
    agent: fast
    componentTools:
      name: cluster-ops-verification
---
# Advisory only: analyze ACS violation, no action
apiVersion: agentic.openshift.io/v1alpha1
kind: Workflow
metadata:
  name: acs-advisory
  namespace: openshift-lightspeed
spec:
  analysis:
    agent: smart
    componentTools:
      name: acs-analysis

---
# Example proposals created by the ACS adapter
apiVersion: agentic.openshift.io/v1alpha1
kind: Proposal
metadata:
  name: acs-cve-nginx-example
  namespace: openshift-lightspeed
  labels:
    agentic.openshift.io/source: acs
    agentic.openshift.io/policy: fixable-cve-critical
spec:
  workflow:
    name: acs-remediation
  request: |
    ACS policy violation: Fixable CVSS >= 7 (severity: CRITICAL_SEVERITY)
    Policy description: Alert on deployments with fixable vulnerabilities with a CVSS of at least 7
    Lifecycle stage: DEPLOY
    Affected deployment: staging/nginx-frontend
    Affected images: nginx:1.21
    Violations:
      - CVE-2023-44487 (CVSS 7.5) in nginx:1.21 — HTTP/2 rapid reset attack
      - CVE-2024-24790 (CVSS 9.8) in nginx:1.21 — path traversal
  targetNamespaces:
    - staging
---
apiVersion: agentic.openshift.io/v1alpha1
kind: Proposal
metadata:
  name: acs-cve-nginx-gitops-example
  namespace: openshift-lightspeed
  labels:
    agentic.openshift.io/source: acs
    agentic.openshift.io/policy: fixable-cve-critical
spec:
  workflow:
    name: acs-gitops-remediation
  request: |
    ACS policy violation: Fixable CVSS >= 7 (severity: CRITICAL_SEVERITY)
    Affected deployment: production/nginx-frontend
    Affected images: nginx:1.21
    This namespace is managed by ArgoCD. Advise git repository changes only.
  targetNamespaces:
    - production

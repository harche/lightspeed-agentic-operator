# GitOps Advisory workflow — execution skipped.
#
# Same as 08-gitops-workflow.yaml but the execution step is skipped.
# The agent analyzes the ACS violation, advises what git changes to make,
# and the user creates and merges the PR manually. No automated PR creation.
#
# Demo flow:
#   1. ACS detects CVE in gitops-advisory-demo namespace
#   2. Adapter creates proposal with gitops-advisory-remediation workflow
#   3. Agent analyzes: inspects cluster, reads git repo, advises image upgrade
#   4. User reviews the proposal in Console
#   5. User manually creates PR with the suggested changes
#   6. User merges PR → ArgoCD syncs → cluster updated
#
# Requires: LLMProvider "smart" from 00-llm-providers.yaml
#           Agent "smart" from 01-agents.yaml
#           gitops-verification ComponentTools from 08-gitops-workflow.yaml

---
# Advisory-specific ComponentTools — same as gitops-analysis but emphasizes
# the user will act on the advice, no execution agent involved
apiVersion: agentic.openshift.io/v1alpha1
kind: ComponentTools
metadata:
  name: gitops-advisory-analysis
  namespace: openshift-lightspeed
spec:
  skills:
    - image: image-registry.openshift-image-registry.svc:5000/openshift-lightspeed/lightspeed-skills:latest
  systemPrompt: |
    You are an expert security remediation advisor for OpenShift clusters
    managed by GitOps (ArgoCD).

    IMPORTANT: The affected namespace is managed by ArgoCD.
    Do NOT propose direct cluster changes. There is NO execution agent —
    you are providing advice only. The user will create the PR themselves.

    ## Your Task
    1. Investigate the ACS policy violation
    2. Read the git repo using `gh` to find files that need changing
    3. Describe the exact YAML changes needed (file paths, diffs)
    4. Make instructions clear enough to copy-paste into a PR

    ## Rules
    - Use `gh` ONLY to READ the git repo
    - Do NOT create branches, commits, or pull requests
    - Do NOT include RBAC permissions — no execution step
  requiredSecrets:
    - name: github-token
      description: "GitHub API token for repository access"
      mountAs: GH_TOKEN

---
# Advisory workflow — execution omitted, verification after user applies
apiVersion: agentic.openshift.io/v1alpha1
kind: Workflow
metadata:
  name: gitops-advisory-remediation
  namespace: openshift-lightspeed
spec:
  analysis:
    agent: smart
    componentTools:
      name: gitops-advisory-analysis
  verification:
    agent: fast
    componentTools:
      name: gitops-verification

---
# ArgoCD Application for advisory demo namespace
# (applied by deploy script, included here for reference)
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: lightspeed-gitops-advisory
  namespace: openshift-gitops
spec:
  description: Lightspeed GitOps advisory demo
  sourceRepos:
  - 'https://github.com/NotAKubeKlaw/lightspeed-gitops-demo'
  destinations:
  - namespace: 'gitops-advisory-demo'
    server: https://kubernetes.default.svc
  clusterResourceWhitelist:
  - group: ''
    kind: Namespace
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lightspeed-gitops-advisory
  namespace: openshift-gitops
spec:
  project: lightspeed-gitops-advisory
  source:
    repoURL: 'https://github.com/NotAKubeKlaw/lightspeed-gitops-demo'
    targetRevision: main
    path: 'apps/gitops-advisory-demo'
  destination:
    server: https://kubernetes.default.svc
    namespace: 'gitops-advisory-demo'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true

---
# Example proposal
apiVersion: agentic.openshift.io/v1alpha1
kind: Proposal
metadata:
  name: gitops-advisory-cve-ubi8-example
  namespace: openshift-lightspeed
  labels:
    agentic.openshift.io/source: gitops-advisory
    agentic.openshift.io/policy: fixable-cve-critical
spec:
  workflow:
    name: gitops-advisory-remediation
  request: |
    ACS policy violation: Fixable CVSS >= 7 (severity: CRITICAL_SEVERITY)
    Policy description: Alert on deployments with fixable vulnerabilities with a CVSS of at least 7
    Affected deployment: gitops-advisory-demo/vulnerable-app
    Affected images: registry.access.redhat.com/ubi8/ubi-minimal:8.6
    Violations:
      - CVE-2023-4911 (CVSS 7.8) in ubi8/ubi-minimal:8.6 — glibc buffer overflow (Looney Tunables)
      - CVE-2023-38545 (CVSS 9.8) in ubi8/ubi-minimal:8.6 — curl SOCKS5 heap overflow

    --- GitOps Context ---
    This namespace is managed by ArgoCD (GitOps). Do NOT make direct cluster changes.
    Describe the exact changes needed in the git repository. The user will create the PR.
    Git repository: https://github.com/NotAKubeKlaw/lightspeed-gitops-demo
    App path in repo: apps/gitops-advisory-demo
    ArgoCD application: lightspeed-gitops-advisory
  targetNamespaces:
    - gitops-advisory-demo

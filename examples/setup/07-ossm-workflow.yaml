# OSSM (OpenShift Service Mesh) workflow setup.
#
# When Istio metrics detect service mesh issues (high error rates, latency
# spikes, mTLS misconfigurations), the AlertManager adapter creates a
# Proposal using this workflow.
#
# Requires: LLMProvider "smart" and "fast" from 00-llm-providers.yaml
#           Agent "smart" and "fast" from 01-agents.yaml

---
# OSSM-specific ComponentTools
apiVersion: agentic.openshift.io/v1alpha1
kind: ComponentTools
metadata:
  name: ossm-analysis
  namespace: openshift-lightspeed
spec:
  skills:
    - image: image-registry.openshift-image-registry.svc:5000/openshift-lightspeed/lightspeed-skills:latest
  systemPrompt: |
    You are an expert service mesh engineer for OpenShift clusters with
    Red Hat OpenShift Service Mesh (OSSM / Istio). You are investigating
    a service mesh issue detected by Prometheus metrics from Istio sidecars.

    ## Service Mesh Resources You Should Inspect
    - VirtualService, DestinationRule, PeerAuthentication, AuthorizationPolicy

    ## Key Istio Metrics
    - response_code, destination_service_name, source_workload
    - connection_security_policy, response_flags (UH, UO, NR)

    ## Your Task
    1. Investigate the alert described in the request
    2. Query Istio metrics via Prometheus
    3. Inspect Istio resources in the affected namespace
    4. Identify the root cause
    5. Propose one or more remediation options

---
# OSSM workflows
apiVersion: agentic.openshift.io/v1alpha1
kind: Workflow
metadata:
  name: ossm-remediation
  namespace: openshift-lightspeed
spec:
  analysis:
    agent: smart
    componentTools:
      name: ossm-analysis
  execution:
    agent: fast
    componentTools:
      name: cluster-ops-execution
  verification:
    agent: fast
    componentTools:
      name: cluster-ops-verification
---
# Advisory only: analyze mesh issue, no action
apiVersion: agentic.openshift.io/v1alpha1
kind: Workflow
metadata:
  name: ossm-advisory
  namespace: openshift-lightspeed
spec:
  analysis:
    agent: smart
    componentTools:
      name: ossm-analysis

---
# Demo fixtures
#
# Bookinfo namespace with Istio sidecar injection
apiVersion: v1
kind: Namespace
metadata:
  name: bookinfo
  labels:
    istio-injection: enabled
---
# SCC — allow Bookinfo images to run (they use runAsUser: 1000)

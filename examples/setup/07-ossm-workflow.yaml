---
# Headless service for Prometheus to scrape Istio sidecar metrics.
# OSSM 3.x injects sidecars via CNI without declaring container ports,
# so PodMonitor portNumber can't match. This Service targets port 15020
# (istio-agent merged prometheus endpoint) and the ServiceMonitor scrapes it.
apiVersion: v1
kind: Service
metadata:
  name: istio-proxy-metrics
  namespace: bookinfo
  labels:
    app.kubernetes.io/part-of: istio
spec:
  clusterIP: None
  selector:
    security.istio.io/tlsMode: istio
  ports:
  - name: http-envoy-prom
    port: 15020
    targetPort: 15020
    protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: istio-proxies
  namespace: bookinfo
spec:
  selector:
    matchLabels:
      app.kubernetes.io/part-of: istio
  endpoints:
  - port: http-envoy-prom
    path: /stats/prometheus
    interval: 15s

---
# Traffic generator — continuous requests to productpage
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-generator
  namespace: bookinfo
  labels:
    app: traffic-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-generator
  template:
    metadata:
      labels:
        app: traffic-generator
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
      - name: load
        image: registry.access.redhat.com/ubi9/ubi-minimal:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          while true; do
            curl -s -o /dev/null -w "%{http_code}\n" http://productpage:9080/productpage
            sleep 2
          done

---
# Fault injection — VirtualService that injects HTTP 500 on 50% of
# requests to ratings service. This is the "break" that creates
# red lines in Kiali and fires the IstioHighErrorRate alert.
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: ratings
  namespace: bookinfo
spec:
  host: ratings
  subsets:
  - name: v1
    labels:
      version: v1
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: ratings-fault
  namespace: bookinfo
spec:
  hosts:
  - ratings
  http:
  - fault:
      abort:
        httpStatus: 500
        percentage:
          value: 50.0
    route:
    - destination:
        host: ratings
        subset: v1

---
# PrometheusRule — fires IstioHighErrorRate when 5xx error rate
# exceeds 5% for any service in the bookinfo namespace.
# Fast firing (1m for demo).
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: istio-mesh-alerts
  namespace: bookinfo
spec:
  groups:
  - name: istio-mesh
    rules:
    - alert: IstioHighErrorRate
      annotations:
        description: >-
          Service {{ $labels.destination_service_name }} in namespace {{ $labels.namespace }}
          has a 5xx error rate of {{ $value | humanizePercentage }} over the last 5 minutes.
          This indicates the service is returning server errors for a significant portion
          of requests within the service mesh.
        summary: High 5xx error rate detected in service mesh.
        runbook_url: https://istio.io/latest/docs/ops/common-problems/
      expr: |
        (
          sum by (destination_service_name, namespace) (rate(istio_requests_total{response_code=~"5..",namespace="bookinfo"}[5m]))
          /
          sum by (destination_service_name, namespace) (rate(istio_requests_total{namespace="bookinfo"}[5m]))
        ) > 0.05
      for: 1m
      labels:
        severity: warning


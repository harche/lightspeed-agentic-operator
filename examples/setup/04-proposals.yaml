# Example proposals — the actual units of work.
# Proposals reference a Workflow and describe what needs to be done.
---
# Remediation proposal (full lifecycle)
apiVersion: agentic.openshift.io/v1alpha1
kind: Proposal
metadata:
  name: fix-crashloop
  namespace: openshift-lightspeed
spec:
  request: "Pod api-server-xyz is crash looping in production namespace"
  workflow:
    name: remediation
  targetNamespaces:
    - production
---
# GitOps advisory (execution skipped, user applies via git)
apiVersion: agentic.openshift.io/v1alpha1
kind: Proposal
metadata:
  name: gitops-fix
  namespace: openshift-lightspeed
spec:
  request: "High memory usage detected in staging — recommend resource limit changes"
  workflow:
    name: gitops-remediation
  targetNamespaces:
    - staging
---
# Advisory-only with workflow override to use smart agent
apiVersion: agentic.openshift.io/v1alpha1
kind: Proposal
metadata:
  name: one-off-advisory
  namespace: openshift-lightspeed
spec:
  request: "Investigate intermittent 503 errors on the api-gateway service"
  workflow:
    name: advisory-only
  targetNamespaces:
    - production
---
# Upgrade proposal (specialized workflow)
apiVersion: agentic.openshift.io/v1alpha1
kind: Proposal
metadata:
  name: upgrade-4-22
  namespace: openshift-lightspeed
spec:
  request: "Upgrade cluster from 4.21 to 4.22"
  workflow:
    name: upgrade
  maxAttempts: 2
